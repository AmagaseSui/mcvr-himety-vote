<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 💡 ラベンダー＆天使モチーフのリッチデザイン */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: linear-gradient(135deg, #f4effa 0%, #e3d7f0 100%); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px 25px; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(138, 99, 190, 0.15); 
            width: 100%; 
            max-width: 480px; 
            box-sizing: border-box; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px; 
        }

        /* 背景の天使の羽 */
        .container::before {
            content: "🪽";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 90px;
            opacity: 0.06;
            transform: rotate(-15deg);
            pointer-events: none;
        }
        
        /* タイトル：スマホでも綺麗に2行に収まるように調整 */
        h1 { 
            font-size: 20px; 
            margin-top: 0;
            margin-bottom: 20px; 
            text-align: center; 
            background: linear-gradient(135deg, #8a63be 0%, #b397dc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800; 
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        h1 span {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #726284;
            -webkit-text-fill-color: #726284; /* 文字グラデーションをリセット */
            margin-top: 4px;
        }

        /* インフォメーション枠 */
        .info-box {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #e8e2f2;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #5d4f6c;
            line-height: 1.6;
        }
        .info-box div { display: flex; margin-bottom: 4px; }
        .info-box div:last-child { margin-bottom: 0; }
        .info-label { font-weight: bold; color: #8a63be; width: 85px; flex-shrink: 0; }
        .info-value { color: #4a3e56; word-break: break-all; }
        .btn-video-link {
            display: inline-block;
            margin-top: 8px;
            color: #ffffff;
            background: #ff0055; 
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(255, 0, 85, 0.2);
        }
        
        /* ⚠️ 締切後に自動出現するアラートのスタイル */
        .alert-box {
            display: none; 
            background-color: #ffeef0; 
            border: 1px solid #f4212e; 
            color: #f4212e; 
            padding: 14px; 
            border-radius: 14px; 
            font-size: 14px; 
            font-weight: bold; 
            text-align: center; 
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(244, 33, 46, 0.08);
            animation: fadeIn 0.3s ease; 
        }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #635375; 
            font-size: 13px; 
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #d3c5e5; 
            border-radius: 12px; 
            font-size: 15px; 
            box-sizing: border-box; 
            transition: all 0.3s ease; 
            background-color: rgba(255, 255, 255, 0.9);
            color: #4a3e56;
        }
        input[type="text"]:focus { 
            border-color: #8a63be; 
            box-shadow: 0 0 0 4px rgba(138, 99, 190, 0.15);
            outline: none; 
        }
        input[type="text"]:disabled {
            background-color: #f1ecf7;
            color: #a395b0;
            cursor: not-allowed;
        }
        
        .checkbox-group {
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #e8e2f2;
        }
        .checkbox-label { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            font-size: 13px; 
            color: #5d4f6c; 
            margin: 6px 0;
        }
        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #8a63be; 
            cursor: pointer;
        }
        .checkbox-label input[type="checkbox"]:disabled {
            cursor: not-allowed;
        }
        
        .preview-title { 
            font-size: 12px; 
            color: #635375; 
            font-weight: bold; 
            margin-top: 25px; 
            margin-bottom: 6px; 
        }
        .preview-box { 
            background: rgba(255, 255, 255, 0.6);
            border: 1px dashed #c0b0d8; 
            border-radius: 14px; 
            padding: 16px; 
            font-size: 14px; 
            color: #4a3e56; 
            white-space: pre-wrap; 
            word-break: break-all; 
            min-height: 60px; 
            line-height: 1.6; 
        }

        .btn-copy { 
            width: 100%;
            background: #ffffff; 
            color: #8a63be; 
            border: 1px solid #dfd3f0; 
            border-radius: 12px; 
            padding: 11px; 
            font-size: 13px; 
            font-weight: 600; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(138, 99, 190, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-copy:hover { background: #fdfbff; border-color: #b397dc; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .btn-row { display: flex; gap: 14px; }
        button.action-btn { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 9999px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        button.action-btn:active { transform: scale(0.96); }
        
        .btn-post { 
            background: linear-gradient(135deg, #b599e2 0%, #8a63be 100%); 
            color: white; 
            box-shadow: 0 6px 20px rgba(138, 99, 190, 0.3);
        }
        .btn-post:hover { box-shadow: 0 8px 24px rgba(138, 99, 190, 0.45); }
        
        .btn-dm { 
            background: linear-gradient(135deg, #5c4d70 0%, #413552 100%); 
            color: white; 
            box-shadow: 0 6px 20px rgba(65, 53, 82, 0.2);
        }
        .btn-dm:hover { box-shadow: 0 8px 24px rgba(65, 53, 82, 0.35); }
        
        /* 🔒 ボタンが非活性（disabled）になったときのスタイル */
        button:disabled, input[type="checkbox"]:disabled {
            background: #d5cfdd !important;
            color: #9b8fa7 !important;
            border-color: #c9bfd3 !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
            transform: none !important;
            pointer-events: none;
        }
        
        .toast { 
            display: none; 
            text-align: center; 
            background-color: #8a63be; 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 13px; 
            margin-top: 12px; 
            animation: fadeIn 0.3s ease; 
        }
        
        /* 注釈フッター */
        .footer-notice {
            max-width: 480px;
            width: 100%;
            font-size: 11px;
            color: #7d6e8d;
            line-height: 1.6;
            text-align: center;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .footer-notice a {
            color: #8a63be;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-notice a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1 id="siteMainTitle"></h1>
    
    <div class="info-box">
        <div><span class="info-label">応援対象：</span><span class="info-value" id="infoStreamer"></span></div>
        <div><span class="info-label">投票楽曲：</span><span class="info-value" id="infoSong"></span></div>
        <div><span class="info-label">投票締切：</span><span class="info-value" id="infoDeadline" style="color:#f4212e; font-weight:bold;"></span></div>
        <a id="infoVideoBtn" class="btn-video-link" target="_blank" style="display:none;">🎬 対象動画を再生する</a>
    </div>
    
    <div id="deadlineAlert" class="alert-box">
        ⚠️ 今回の投票期間は終了しました。
    </div>
    
    <div class="form-group">
        <label for="userMessage">自由入力メッセージ（熱い思いなど自由に変えられます）：</label>
        <input type="text" id="userMessage" placeholder="例: 最高に熱い曲です！一人でも多くの人に聴いてもらいたい！" oninput="updatePreview()">
    </div>

    <div class="form-group">
        <label>投稿オプション：</label>
        <div class="checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" id="includeDate" onchange="toggleOption('includeDate')"> 先頭に今日の日付を追加する
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="includeVideo" onchange="toggleOption('includeVideo')"> 末尾に動画URLを追加する
            </label>
        </div>
    </div>

    <div class="preview-title">投稿文章のプレビュー：</div>
    <div class="preview-box" id="previewText"></div>
    
    <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">📋 文章をクリップボードにコピー</button>
    <div class="toast" id="toastMessage">文章をコピーしました！Xに手動で貼ることもできます。</div>

    <div class="btn-group">
        <div class="btn-row">
            <button class="action-btn btn-post" id="btnPost" onclick="shareToX('post')">Xにポスト 🪽</button>
            <button class="action-btn btn-dm" id="btnDm" onclick="shareToX('dm')">DMを送る ✉️</button>
        </div>
    </div>
</div>

<footer class="footer-notice" id="footerNotice"></footer>

<script>
// ========================================================
// ⚙️ ★超一元管理設定エリア★
// ========================================================
const CONFIG = {
    streamerName: '夢羽ヒメ',                               // *streamerName*
    songTitle: '彩光 -イリザシオン-',                            // *SongTitle*
    videoUrl: 'https://youtu.be/Kaowp9KvnTo?si=-9hz87M4dlUBT8dO',                     // *videoURL*
    
    // 💡 締切日時（日本時間形式「YYYY-MM-DDTHH:mm:ss+09:00」で入力してください）
    // 変更例：2026年9月10日の23時59分までなら '2026-09-10T23:59:00+09:00'
    deadline: '2026-08-25T23:59:00+09:00',
    
    additionalHashtag: '#ミューコミVR #VTuber楽曲ランキング #夢羽ヒメ',           // *additionalHashtag*
    recipientId: '100786821'                                          // DMの宛先数値ID（空欄でも可）
};
// ========================================================

let currentDateStr = '';

function initSite() {
    // 1. ページタイトルと、スマホで綺麗に2行になる見出しを設定
    const pageTitle = `${CONFIG.streamerName}ミューコミVR投票サイト`;
    document.title = pageTitle;
    document.getElementById('siteMainTitle').innerHTML = `✨ 🪽 ${CONFIG.streamerName} 🪽 ✨️<span>ミューコミVR投票サイト</span>`;
    
    // 2. インフォメーション枠の設定（締切日時から表示テキストを動的に自動生成）
    document.getElementById('infoStreamer').innerText = CONFIG.streamerName;
    document.getElementById('infoSong').innerText = CONFIG.songTitle;
    
    const deadlineDate = new Date(CONFIG.deadline);
    const month = deadlineDate.getMonth() + 1;
    const date = deadlineDate.getDate();
    const dayStr = ['日', '月', '火', '水', '木', '金', '土'][deadlineDate.getDay()];
    const hours = String(deadlineDate.getHours()).padStart(2, '0');
    const minutes = String(deadlineDate.getMinutes()).padStart(2, '0');
    const deadlineDisplayText = `${month}月${date}日(${dayStr}) ${hours}:${minutes}まで`;
    
    document.getElementById('infoDeadline').innerText = deadlineDisplayText;
    
    const videoBtn = document.getElementById('infoVideoBtn');
    if (CONFIG.videoUrl) {
        videoBtn.href = CONFIG.videoUrl;
        videoBtn.style.display = 'inline-block';
    } else {
        videoBtn.style.display = 'none';
    }
    
    // 3. フッターの免責事項を自動生成
    document.getElementById('footerNotice').innerHTML = 
        `当サイトはファンが運営する非公式サイトであり、${CONFIG.streamerName}様、およびミューコミVR様とは一切関係ございません。` +
        `当サイトに関するお問い合わせは、<a href="https://x.com/amgs_lvhmt" target="_blank">@amgs_lvhmt</a> までお願いいたします。`;

    // 4. 日本時間(JST)で今日の「yyyy/MM/dd」を取得して変数に保持
    const now = new Date();
    currentDateStr = now.toLocaleDateString('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    });

    // 5. キャッシュ（localStorage）からチェックボックスの状態を読み込む（デフォルトON）
    initCheckbox('includeDate', true);
    initCheckbox('includeVideo', true);
    
    updatePreview();

    // 6. 🕒 締切日時の自動超過判定
    checkDeadline(now);
}

function initCheckbox(id, defaultValue) {
