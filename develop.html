<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 💡 ラベンダー＆天使モチーフのリッチデザイン */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: linear-gradient(135deg, #f4effa 0%, #e3d7f0 100%); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px 25px; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(138, 99, 190, 0.15); 
            width: 100%; 
            max-width: 480px; 
            box-sizing: border-box; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px; 
        }

        /* 背景の天使の羽 */
        .container::before {
            content: "🪽";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 90px;
            opacity: 0.06;
            transform: rotate(-15deg);
            pointer-events: none;
        }
        
        /* タイトル */
        h1 { 
            font-size: 20px; 
            margin-top: 0;
            margin-bottom: 20px; 
            text-align: center; 
            background: linear-gradient(135deg, #8a63be 0%, #b397dc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800; 
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        h1 span {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #726284;
            -webkit-text-fill-color: #726284;
            margin-top: 4px;
        }

        /* インフォメーション枠 */
        .info-box {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #e8e2f2;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #5d4f6c;
            line-height: 1.6;
        }
        .info-box div { display: flex; margin-bottom: 4px; }
        .info-box div:last-child { margin-bottom: 0; }
        .info-label { font-weight: bold; color: #8a63be; width: 85px; flex-shrink: 0; }
        .info-value { color: #4a3e56; word-break: break-all; }
        .btn-video-link {
            display: inline-block;
            margin-top: 8px;
            color: #ffffff;
            background: #ff0055; 
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(255, 0, 85, 0.2);
        }
        
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #635375; 
            font-size: 13px; 
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #d3c5e5; 
            border-radius: 12px; 
            font-size: 15px; 
            box-sizing: border-box; 
            transition: all 0.3s ease; 
            background-color: rgba(255, 255, 255, 0.9);
            color: #4a3e56;
        }
        input[type="text"]:focus { 
            border-color: #8a63be; 
            box-shadow: 0 0 0 4px rgba(138, 99, 190, 0.15);
            outline: none; 
        }
        
        .checkbox-group {
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #e8e2f2;
        }
        .checkbox-label { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            font-size: 13px; 
            color: #5d4f6c; 
            margin: 6px 0;
        }
        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #8a63be; 
            cursor: pointer;
        }
        
        .preview-title { 
            font-size: 12px; 
            color: #635375; 
            font-weight: bold; 
        }
        .preview-box { 
            background: rgba(255, 255, 255, 0.6);
            border: 1px dashed #c0b0d8; 
            border-radius: 14px; 
            padding: 16px; 
            font-size: 14px; 
            color: #4a3e56; 
            white-space: pre-wrap; 
            word-break: break-all; 
            min-height: 60px; 
            line-height: 1.6; 
        }

        .btn-copy { 
            width: 100%;
            background: #ffffff; 
            color: #8a63be; 
            border: 1px solid #dfd3f0; 
            border-radius: 12px; 
            padding: 11px; 
            font-size: 13px; 
            font-weight: 600; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(138, 99, 190, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-copy:hover:not(:disabled) { background: #fdfbff; border-color: #b397dc; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .btn-row { display: flex; gap: 14px; }
        button.action-btn { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 9999px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        button.action-btn:active:not(:disabled) { transform: scale(0.96); }
        
        .btn-post { 
            background: linear-gradient(135deg, #b599e2 0%, #8a63be 100%); 
            color: white; 
            box-shadow: 0 6px 20px rgba(138, 99, 190, 0.3);
        }
        .btn-post:hover:not(:disabled) { box-shadow: 0 8px 24px rgba(138, 99, 190, 0.45); }
        
        .btn-dm { 
            background: linear-gradient(135deg, #5c4d70 0%, #413552 100%); 
            color: white; 
            box-shadow: 0 6px 20px rgba(65, 53, 82, 0.2);
        }
        .btn-dm:hover:not(:disabled) { box-shadow: 0 8px 24px rgba(65, 53, 82, 0.35); }
        
        /* 🚫 非活性（disabled）時のグレーアウト表現 */
        button:disabled, .btn-copy:disabled { 
            background: #dcd6e5 !important; 
            color: #a396b2 !important; 
            border-color: #d3c8df !important; 
            box-shadow: none !important; 
            cursor: not-allowed !important; 
            transform: none !important;
            opacity: 0.7;
        }

        .toast { 
            display: none; 
            text-align: center; 
            background-color: #8a63be; 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 13px; 
            margin-top: 12px; 
            animation: fadeIn 0.3s ease; 
        }

        /* 📅 カレンダー用スタイル */
        .calendar-container {
            padding: 25px 20px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-title {
            font-size: 15px;
            font-weight: bold;
            color: #635375;
        }
        .calendar-btn {
            background: #ffffff;
            border: 1px solid #dfd3f0;
            border-radius: 8px;
            padding: 4px 10px;
            cursor: pointer;
            color: #8a63be;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }
        .calendar-btn:hover { background: #fdfbff; border-color: #b397dc; }
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .calendar-table th {
            font-size: 11px;
            color: #8a63be;
            padding-bottom: 6px;
            font-weight: bold;
            text-align: center;
        }
        .calendar-table td {
            border: 1px solid #e8e2f2;
            height: 52px;
            vertical-align: top;
            padding: 4px;
            background: rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }
        .calendar-day-num {
            font-size: 10px;
            font-weight: bold;
            color: #726284;
            display: block;
        }
        .calendar-table td.today {
            background: rgba(138, 99, 190, 0.08);
            outline: 2px solid #8a63be;
        }
        .badge-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 3px;
        }
        .c-badge {
            font-size: 8px;
            padding: 1px 2px;
            border-radius: 4px;
            color: #ffffff;
            text-align: center;
            font-weight: bold;
            display: block;
            white-space: nowrap;
        }
        .c-badge-post { background: linear-gradient(135deg, #b599e2 0%, #8a63be 100%); }
        .c-badge-dm { background: linear-gradient(135deg, #5c4d70 0%, #413552 100%); }
        
        /* 注釈フッター */
        .footer-notice {
            max-width: 480px;
            width: 100%;
            font-size: 11px;
            color: #7d6e8d;
            line-height: 1.6;
            text-align: center;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .footer-notice a {
            color: #8a63be;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-notice a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1 id="siteMainTitle"></h1>
    
    <div class="info-box">
        <div><span class="info-label">応援対象：</span><span class="info-value" id="infoStreamer"></span></div>
        <div><span class="info-label">投票楽曲：</span><span class="info-value" id="infoSong"></span></div>
        <div><span class="info-label">投票締切：</span><span class="info-value" id="infoDeadline" style="color:#f4212e; font-weight:bold;"></span></div>
        <a id="infoVideoBtn" class="btn-video-link" target="_blank" style="display:none;">🎬 対象動画を再生する</a>
    </div>

    <div class="form-group">
        <label>文章パターン（同じ文章の連続投稿によるXのスパム判定対策）：</label>
        <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.4); padding: 10px 15px; border-radius: 12px; border: 1px solid #e8e2f2;">
            <span id="templateLabel" style="font-size: 13px; color: #5d4f6c; font-weight: bold;">パターン 1</span>
            <button class="calendar-btn" onclick="switchTemplate()" style="margin: 0; padding: 6px 12px;">パターンを切り替える 🔁</button>
        </div>
    </div>
    
    <div class="form-group">
        <label for="userMessage">自由入力メッセージ（熱い思いなど自由に変えられます）：</label>
        <input type="text" id="userMessage" placeholder="例: 最高に熱い曲です！一人でも多くの人に聴もらいたい！" oninput="updatePreview()">
    </div>

    <div class="form-group">
        <label>投稿オプション：</label>
        <div class="checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" id="includeDate" onchange="toggleOption('includeDate')"> 先頭に今日の日付を追加する
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="includeVideo" onchange="toggleOption('includeVideo')"> 末尾に動画URLを追加する
            </label>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 25px; margin-bottom: 6px;">
        <div class="preview-title">投稿文章のプレビュー：</div>
        <div id="charCounter" style="font-size: 12px; font-weight: bold; color: #635375;">0 / 140 文字</div>
    </div>
    <div class="preview-box" id="previewText"></div>
    
    <div id="charNotice" style="font-size: 10px; color: #8a7a9c; margin-top: 5px; text-align: right; line-height: 1.3;">
        ※あくまで参考です。Xの仕様変更により実際の制限と差異が生じる可能性あります
    </div>
    
    <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">📋 文章をクリップボードにコピー</button>
    <div class="toast" id="toastMessage">文章をコピーしました！Xに手動で貼ることもできます。</div>

    <div class="btn-group">
        <div class="btn-row">
            <button class="action-btn btn-post" id="btnPost" onclick="shareToX('post')">Xにポスト 🪽</button>
            <button class="action-btn btn-dm" id="btnDm" onclick="shareToX('dm')">DMを送る ✉️</button>
        </div>
    </div>
</div>

<div class="container calendar-container">
    <div class="calendar-header">
        <button class="calendar-btn" onclick="changeMonth(-1)">◀ 前月</button>
        <div class="calendar-title" id="calendarTitle"></div>
        <button class="calendar-btn" onclick="changeMonth(1)">次月 ▶</button>
    </div>
    <table class="calendar-table">
        <thead>
            <tr>
                <th style="color: #ff5c5c;">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th style="color: #5c85ff;">土</th>
            </tr>
        </thead>
        <tbody id="calendarBody"></tbody>
    </table>
    
    <div style="font-size: 11px; color: #8a7a9c; text-align: center; margin-top: 15px; line-height: 1.5; background: rgba(255,255,255,0.3); padding: 8px; border-radius: 8px;">
        ⚠️ <strong>ご注意：</strong>ブラウザのキャッシュや閲覧履歴（Local Storage）を削除すると、これまでの応援記録カレンダーはすべて初期化されます。
    </div>
</div>

<footer class="footer-notice" id="footerNotice"></footer>

<script>
// ========================================================
// ⚙️ ★超一元管理設定エリア★
// ========================================================
const CONFIG = {
    streamerName: '夢羽ヒメ',
    songTitle: '彩光 -イリザシオン-',
    videoUrl: 'https://youtu.be/Kaowp9KvnTo?si=-9hz87M4dlUBT8dO',
    deadline: '2026-08-25T23:59:00', // ハイフン・スラッシュどちらでも自動対応
    additionalHashtag: '#ミューコミVR #VTuber楽曲ランキング #夢羽ヒメ',
    recipientId: '100786821',

    templates: [
        "({streamerName})さんの『{songTitle}』に投票します！\n\n{userMessage}",
        "応援している({streamerName})さんの神曲『{songTitle}』に1票入れます！✨\n\n{userMessage}",
        "ミューコミVRの楽曲ランキング、今回は({streamerName})さんの『{songTitle}』で決まり！🎵\n\n{userMessage}"
    ]
};
// ========================================================

let currentDateStr = '';
let currentCalDate = new Date(); 
let isExpired = false; 
let currentTemplateIdx = 0; 

function formatDeadline(dateObj) {
    if (isNaN(dateObj.getTime())) return '日付設定エラー';
    const days = ['日', '月', '火', '水', '木', '金', '土'];
    const m = dateObj.getMonth() + 1;
    const d = dateObj.getDate();
    const w = days[dateObj.getDay()];
    const h = String(dateObj.getHours()).padStart(2, '0');
    const min = String(dateObj.getMinutes()).padStart(2, '0');
    return `${m}月${d}日(${w}) ${h}:${min}まで`;
}

function getXPoints(text) {
    const urlRegex = /https?:\/\/[^\s\n]+/g;
    let processedText = text;
    const urls = text.match(urlRegex);
    if (urls) {
        urls.forEach(url => {
            processedText = processedText.replace(url, "x".repeat(23));
        });
    }
    
    let points = 0;
    for (let i = 0; i < processedText.length; i++) {
        const code = processedText.charCodeAt(i);
        let isSurrogate = (code >= 0xd800 && code <= 0xdbff);
        
        if (!isSurrogate && ((code >= 0x0000 && code <= 0x007f) || (code >= 0xff61 && code <= 0xff9f))) {
            points += 1; 
        } else {
            if (isSurrogate) i++; 
            points += 2; 
        }
    }
    return points;
}

function initSite() {
    const pageTitle = `${CONFIG.streamerName}ミューコミVR投票サイト`;
    document.title = pageTitle;
    
    document.getElementById('siteMainTitle').innerHTML = `✨ 🪽 ${CONFIG.streamerName} 🪽 ✨️<span>ミューコミVR投票サイト</span>`;
    document.getElementById('infoStreamer').innerText = CONFIG.streamerName;
    document.getElementById('infoSong').innerText = CONFIG.songTitle;
    
    // 🛠️ Safari安全対策：ハイフン区切りをスラッシュ区切りに置換してからパース
    const safeDeadlineStr = CONFIG.deadline.replace(/-/g, '/').replace('T', ' ');
    const deadlineDate = new Date(safeDeadlineStr);
    document.getElementById('infoDeadline').innerText = formatDeadline(deadlineDate);
    
    const now = new Date();
    if (now > deadlineDate) {
        isExpired = true;
        document.getElementById('infoDeadline').innerText += '（投票期間は終了しました）';
    }
    
    const videoBtn = document.getElementById('infoVideoBtn');
    if (CONFIG.videoUrl) {
        videoBtn.href = CONFIG.videoUrl;
        videoBtn.style.display = 'inline-block';
    } else {
        videoBtn.style.display = 'none';
    }
    
    document.getElementById('footerNotice').innerHTML = 
        `当サイトはファンが運営する非公式サイトであり、${CONFIG.streamerName}様、およびミューコミVR様とは一切関係ございません。` +
        `当サイトに関するお問い合わせは、<a href="https://x.com/amgs_lvhmt" target="_blank">@amgs_lvhmt</a> までお願いいたします。`;

    currentDateStr = now.toLocaleDateString('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    });

    initCheckbox('includeDate', true);
    initCheckbox('includeVideo', true);
    
    updatePreview();
    renderCalendar();
}

function initCheckbox(id, defaultValue) {
    const checkbox = document.getElementById(id);
    const saved = localStorage.getItem(id);
    if (saved !== null) {
        checkbox.checked = (saved === 'true');
    } else {
        checkbox.checked = defaultValue;
    }
}

function toggleOption(id) {
    const checkbox = document.getElementById(id);
    localStorage.setItem(id, checkbox.checked);
    updatePreview();
}

function switchTemplate() {
    currentTemplateIdx = (currentTemplateIdx + 1) % CONFIG.templates.length;
    document.getElementById('templateLabel').innerText = `パターン ${currentTemplateIdx + 1}`;
    updatePreview();
}

function generateText() {
    let text = '';
    
    if (document.getElementById('includeDate').checked) {
        text += `${currentDateStr}\n`;
    }
    
    let baseText = CONFIG.templates[currentTemplateIdx];
    baseText = baseText.replace(/{streamerName}/g, CONFIG.streamerName);
    baseText = baseText.replace(/{songTitle}/g, CONFIG.songTitle);
    
    const userMessage = document.getElementById('userMessage').value;
    if (userMessage) {
        baseText = baseText.replace(/{userMessage}/g, `${userMessage}\n\n`);
    } else {
        baseText = baseText.replace(/{userMessage}/g, '');
    }
    
    text += baseText;
    
    if (!text.endsWith('\n')) text += '\n';
    text += `${CONFIG.additionalHashtag}`;
    
    if (document.getElementById('includeVideo').checked && CONFIG.videoUrl) {
        text += `\n\n${CONFIG.videoUrl}`;
    }
    
    return text;
}

function updatePreview() {
    const text = generateText();
    const previewEl = document.getElementById('previewText');
    if (previewEl) previewEl.innerText = text;
    
    const points = getXPoints(text);
    const displayCount = (points / 2).toFixed(1).replace('.0', ''); 
    const counterEl = document.getElementById('charCounter');
    
    if (counterEl) {
        counterEl.innerText = `${displayCount} / 140 文字`;
        const isOverLimit = points > 280; 
        
        if (isOverLimit) {
            counterEl.style.color = '#f4212e';
            counterEl.innerText += ' (文字数オーバー！)';
        } else {
            counterEl.style.color = '#635375';
        }
        
        const shouldDisable
