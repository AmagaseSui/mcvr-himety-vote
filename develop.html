<body>
<div class="container">
<h1 id="siteMainTitle"></h1>
<div class="info-box">
<div><span class="info-label">応援対象：</span><span class="info-value" id="infoStreamer"></span></div>

</div>
</div>
<div class="form-group">
<label for="userMessage">自由入力メッセージ（熱い思いなど自由に変えられます）：</label>
<input type="text" id="userMessage" placeholder="ここにメッセージを入力" oninput="updatePreview()">
</div>
<div class="form-group">
<label>投稿オプション：</label>
<div class="checkbox-group">
<label class="checkbox-label"><input type="checkbox" id="includeDate" onchange="toggleOption('includeDate')"> 先頭に今日の日付を追加する</label>
<label class="checkbox-label"><input type="checkbox" id="includeVideo" onchange="toggleOption('includeVideo')"> 末尾に動画URLを追加する</label>
</div>
</div>
<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:25px;margin-bottom:6px">
<div class="preview-title">投稿文章のプレビュー：</div>
<div id="charCounter" style="font-size:12px;font-weight:bold;color:#635375">0 / 140 文字</div>
</div>
<div class="preview-box" id="previewText"></div>
<div id="charNotice" style="font-size:10px;color:#8a7a9c;margin-top:5px;text-align:right;line-height:1.3">※右上の文字数制限はあくまで参考です。</div>
<button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">📋 文章をクリップボードにコピー</button>
<div class="toast" id="toastMessage">文章をコピーしました！Xに手動で貼ることもできます。</div>
<div class="btn-group"><div class="btn-row">
<button class="action-btn btn-post" id="btnPost" onclick="shareToX('post')">Xにポスト 🪽</button>
<button class="action-btn btn-dm" id="btnDm" onclick="shareToX('dm')">DMを送る ✉️</button>
</div></div>
</div>
<div class="container calendar-container">
<div class="calendar-header"><button class="calendar-btn" onclick="changeMonth(-1)">◀ 前月</button><div class="calendar-title" id="calendarTitle"></div><button class="calendar-btn" onclick="changeMonth(1)">次月 ▶</button></div>
<table class="calendar-table">
<thead><tr><th style="color:#ff5c5c">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th style="color:#5c85ff">土</th></tr></thead>
<tbody id="calendarBody"></tbody>
</table>
<div style="font-size:11px;color:#8a7a9c;text-align:center;margin-top:15px;line-height:1.5;background:rgba(255,255,255,0.3);padding:8px;border-radius:8px">⚠️ <strong>ご注意：</strong>ブラウザのキャッシュや閲覧履歴を削除すると、これまでの応援記録はすべて初期化されます。</div>
</div>
<footer class="footer-notice" id="footerNotice"></footer>

<script>
// ========================================================

// ========================================================
const CONFIG = {
    streamerName: '夢羽ヒメ',
    songTitle: '彩光 -イリザシオン-',

    additionalHashtag: '#ミューコミVR #VTuber楽曲ランキング #夢羽ヒメ',
    recipientId: '100786821',
    presets: [
        "最高に熱い曲です！一人でも多くの人に聴いてもらいたい！",
        "毎日聴くほど大好きな神曲です！応援しています✨",
        "圧倒的な歌唱力と最高のメロディ、ぜひ聴いてみてください！"
    ]
};
// ========================================================

{CONFIG.streamerName})さんの『${CONFIG.songTitle}』に投票します！\n\n`;const t=$("userMessage").value;return t&&(e+=`${t}\n\n`),e+=CONFIG.additionalHashtag,$("includeVideo").checked&&CONFIG.videoUrl&&(e+=`\n\n${CONFIG.videoUrl}`),e}function updatePreview(){const e=generateText();$("previewText")&&($("previewText").innerText=e);const t=$("userMessage").value,n=/[\(\)『』]/.test(t);$("userMessage").style.borderColor=n?"#f4212e":"#d3c5e5";const r=getXPoints(e),o=(r/2).toFixed(1).replace(".0",""),a=$("charCounter");if(a){const e=r>280;n?(a.innerText=`⚠️禁止文字 ( ) 『 』 があります`,a.style.color="#f4212e"):(a.innerText=`${o} / 140 文字${e?" (文字数オーバー！)":""}`,a.style.color=e?"#f4212e":"#635375");const c=isExpired||e||n;$("btnPost").disabled=c,$("btnDm").disabled=c,$("btnCopy").disabled=c}}function copyToClipboard(){navigator.clipboard.writeText(generateText()).then((()=>{$("toastMessage").style.display="block",setTimeout((()=>{$("toastMessage").style.display="none"}),3e3)}))}function shareToX(e){const t=new Date,n=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;let r={};try{r=JSON.parse(localStorage.getItem("vote_track_log"))||{}}catch(e){}r[n]||(r[n]={post:0,dm:0}),r[n][e]=(r[n][e]||0)+1,localStorage.setItem("vote_track_log",JSON.stringify(r)),renderCalendar();const o=encodeURIComponent(generateText());window.open("post"===e?`https://twitter.com/intent/tweet?text=${o}`:`https://x.com/messages/compose?text=${o}${CONFIG.recipientId?`&recipient_id=${CONFIG.recipientId}`:""}`,"_blank")}function renderCalendar(){const e=currentCalDate.getFullYear(),t=currentCalDate.getMonth();$("calendarTitle")&&($("calendarTitle").innerText=`${e}年${t+1}月`);let n={};try{n=JSON.parse(localStorage.getItem("vote_track_log"))||{}}catch(e){}const r=new Date(e,t,1).getDay(),o=new Date(e,t+1,0).getDate(),a=$("calendarBody");if(!a)return;a.innerHTML="";let c=1,s=new Date;for(let h=0;h<6;h++){let d=document.createElement("tr"),i=!1;for(let u=0;u<7;u++){let cell=document.cre </body>
